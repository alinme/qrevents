name: deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - 'tests/**'
      - 'AGENTS.md'
      - 'DEPLOY_CHECKLIST.md'
      - 'START.md'
      - 'DESIGN.md'
      - '.agents/**'
      - '.augment/**'
      - 'skills-lock.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: /home/eventsmart/htdocs/eventsmart.app
      LIVE_URL: https://eventsmart.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect deploy scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          ZERO_SHA="0000000000000000000000000000000000000000"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "$ZERO_SHA" ]; then
            CHANGED_FILES="$(git show --pretty='' --name-only "$AFTER")"
          else
            CHANGED_FILES="$(git diff --name-only "$BEFORE" "$AFTER")"
          fi

          echo "Changed files:"
          printf '%s\n' "$CHANGED_FILES"

          has_match() {
            printf '%s\n' "$CHANGED_FILES" | grep -Eq "$1"
          }

          frontend_build_changed=false
          frontend_dependencies_changed=false
          backend_changed=false
          backend_dependencies_changed=false
          migrations_changed=false
          queue_changed=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            frontend_build_changed=true
            frontend_dependencies_changed=true
            backend_changed=true
            backend_dependencies_changed=true
            migrations_changed=true
            queue_changed=true
          fi

          if has_match '^(resources/|routes/|app/Http/Controllers/|vite\.config\.[^/]+$|tailwind\.config\.[^/]+$|postcss\.config\.[^/]+$)'; then
            frontend_build_changed=true
          fi

          if has_match '^(package(-lock)?\.json$)'; then
            frontend_dependencies_changed=true
            frontend_build_changed=true
          fi

          if has_match '^(app/|bootstrap/|config/|database/|lang/|routes/|composer\.(json|lock)$)'; then
            backend_changed=true
          fi

          if has_match '^(composer\.(json|lock)$)'; then
            backend_dependencies_changed=true
          fi

          if has_match '^(database/migrations/)'; then
            migrations_changed=true
          fi

          if has_match '^(app/(Jobs|Listeners|Notifications|Console)/|routes/console\.php$|bootstrap/app\.php$)'; then
            queue_changed=true
          fi

          {
            echo "frontend_build=$frontend_build_changed"
            echo "frontend_dependencies=$frontend_dependencies_changed"
            echo "backend=$backend_changed"
            echo "backend_dependencies=$backend_dependencies_changed"
            echo "migrations=$migrations_changed"
            echo "queue=$queue_changed"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize deploy scope
        shell: bash
        run: |
          {
            echo "### Deploy Scope"
            echo "- Frontend build: ${{ steps.scope.outputs.frontend_build }}"
            echo "- Frontend dependencies: ${{ steps.scope.outputs.frontend_dependencies }}"
            echo "- Backend cache refresh: ${{ steps.scope.outputs.backend }}"
            echo "- Composer install: ${{ steps.scope.outputs.backend_dependencies }}"
            echo "- Migrations: ${{ steps.scope.outputs.migrations }}"
            echo "- Queue restart: ${{ steps.scope.outputs.queue }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -n "${{ secrets.DEPLOY_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" > ~/.ssh/known_hosts
          fi

          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to production
        shell: bash
        run: |
          set -eEuo pipefail
          trap 'echo "::error::Deployment failed while executing remote deploy commands."' ERR

          PORT="${DEPLOY_PORT:-22}"

          ssh \
            -i ~/.ssh/deploy_key \
            -p "$PORT" \
            -o IdentitiesOnly=yes \
            -o ConnectTimeout=15 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "GITHUB_SHA='${{ github.sha }}' DEPLOY_PATH='$DEPLOY_PATH' FRONTEND_BUILD_CHANGED='${{ steps.scope.outputs.frontend_build }}' FRONTEND_DEPENDENCIES_CHANGED='${{ steps.scope.outputs.frontend_dependencies }}' BACKEND_CHANGED='${{ steps.scope.outputs.backend }}' BACKEND_DEPENDENCIES_CHANGED='${{ steps.scope.outputs.backend_dependencies }}' MIGRATIONS_CHANGED='${{ steps.scope.outputs.migrations }}' QUEUE_CHANGED='${{ steps.scope.outputs.queue }}' bash -se" <<'REMOTE'
          set -eEuo pipefail
          trap 'echo "Remote deploy failed on line $LINENO" >&2' ERR

          cd "$DEPLOY_PATH"

          STASH_CREATED=0
          STASH_REF=""
          if ! git diff --quiet || [ -n "$(git ls-files --others --exclude-standard)" ]; then
            git stash push --include-untracked -m "github-actions-pre-deploy-${GITHUB_SHA:0:7}"
            STASH_CREATED=1
            STASH_REF="$(git stash list --format='%gd' -n 1)"
          fi

          git pull origin main

          if [ "$STASH_CREATED" -eq 1 ]; then
            if git stash pop "$STASH_REF"; then
              echo "Restored server-local generated drift"
            else
              echo "Skipping conflicting server-local generated drift in resources/js/actions and resources/js/routes"
              git restore --source=HEAD --staged --worktree resources/js/actions resources/js/routes || true
              git clean -fd -- resources/js/actions resources/js/routes || true
              git stash drop "$STASH_REF" || true
            fi
          fi

          if [ "$BACKEND_DEPENDENCIES_CHANGED" = "true" ] || [ ! -f vendor/autoload.php ]; then
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
          fi

          if [ "$FRONTEND_BUILD_CHANGED" = "true" ]; then
            if [ "$FRONTEND_DEPENDENCIES_CHANGED" = "true" ] || [ ! -d node_modules ]; then
              if [ -f package-lock.json ]; then
                npm ci --no-audit --no-fund
              else
                npm install --no-audit --no-fund
              fi
            else
              echo "Reusing existing node_modules on the server"
            fi

            npm run build
          fi

          if [ "$MIGRATIONS_CHANGED" = "true" ]; then
            php artisan migrate --force
          fi

          if [ "$BACKEND_CHANGED" = "true" ]; then
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
          fi

          if [ "$QUEUE_CHANGED" = "true" ]; then
            php artisan queue:restart
            pm2 restart qrevents-queue
            pm2 status qrevents-queue
          fi

          printf 'REMOTE_HEAD=%s\n' "$(git rev-parse HEAD)"
          REMOTE

      - name: Verify deployed commit
        shell: bash
        run: |
          set -eEuo pipefail
          trap 'echo "::error::Remote commit verification failed."' ERR

          PORT="${DEPLOY_PORT:-22}"

          REMOTE_HEAD="$(
            ssh \
              -i ~/.ssh/deploy_key \
              -p "$PORT" \
              -o IdentitiesOnly=yes \
              -o ConnectTimeout=15 \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "cd '$DEPLOY_PATH' && git rev-parse HEAD"
          )"

          echo "Remote HEAD: $REMOTE_HEAD"
          test "$REMOTE_HEAD" = "${{ github.sha }}"

      - name: Verify public site
        shell: bash
        run: |
          set -eEuo pipefail
          trap 'echo "::error::Public site health check failed."' ERR

          curl -fsSIL "$LIVE_URL" | sed -n '1,12p'

      - name: Publish deploy summary
        if: success()
        shell: bash
        run: |
          {
            echo
            echo "### Deploy Complete"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Live URL: $LIVE_URL"
            echo "- Server: \`${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}\`"
          } >> "$GITHUB_STEP_SUMMARY"
